version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=us-east-1
      - DYNAMODB_TABLE_NAME=job-analyzer-jobs-dev
      - S3_BUCKET_NAME=job-analyzer-data-lake-dev-ingr
      - ADZUNA_APP_ID=${ADZUNA_APP_ID}
      - ADZUNA_APP_KEY=${ADZUNA_APP_KEY}
    volumes:
      - ~/.aws:/root/.aws:ro
    restart: unless-stopped